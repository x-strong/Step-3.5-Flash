name: Translate README
on:
  push:
    paths:
      - 'README.md'
    branches:
      - main

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Translate README.md
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          python -c "
          import os
          import sys
          from openai import OpenAI

          api_key = os.environ.get('STEPFUN_API_KEY')
          if not api_key:
              print('STEPFUN_API_KEY is not set; skipping README translation step.', file=sys.stderr)
              sys.exit(0)

          client = OpenAI(
              api_key=api_key,
              base_url='https://api.stepfun.com/v1'
          )
          
          with open('README.md', 'r') as f:
              content = f.read()
              
          system_prompt = \"\"\"You are a professional technical translator. 
          Translate the following Markdown content from English to Chinese (Simplified). 
          Maintain all formatting, links, and code blocks exactly as they are. 
          Only translate the text content.
          The file is a README for an AI model named 'Step 3.5 Flash'.
          \"\"\"

          response = client.chat.completions.create(
              model='step-3.5-flash',
              messages=[
                  {'role': 'system', 'content': system_prompt},
                  {'role': 'user', 'content': content}
              ]
          )
          
          translated_content = response.choices[0].message.content
          
          with open('README.zh-CN.md', 'w') as f:
              f.write(translated_content)
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-translate README to Chinese"
          title: "docs: Update README.zh-CN.md"
          body: "Auto-generated translation of README.md updates."
          branch: "auto-translate/readme"
